# SearXNG settings for UnSearch API
# See https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

general:
  debug: false
  instance_name: "UnSearch SearXNG"

search:
  safe_search: 1
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "unsearch_searxng_secret_key_2026_change_in_prod"
  base_url: false
  image_proxy: true
  limiter: false

ui:
  default_theme: "simple"
  default_locale: "en"
  theme_args:
    simple_style: "auto"

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0

enabled_plugins:
  - 'Hash plugin'
  - 'Search on category select'
  - 'Self Information'
  - 'Tracker URL remover'
