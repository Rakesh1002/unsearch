events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }

    upstream searxng {
        server searxng:8080;
    }

    upstream flower {
        server flower:5555;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=10r/s;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/xml text/css text/javascript application/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API server
    server {
        listen 80;
        server_name api.UnSearch.io localhost;

        # Redirect to HTTPS in production
        # return 301 https://$server_name$request_uri;

        # API endpoints
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Health check
        location /health {
            proxy_pass http://api/health;
            access_log off;
        }

        # Metrics (restricted)
        location /metrics {
            proxy_pass http://api/metrics;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }

        # Documentation
        location /docs {
            proxy_pass http://api/docs;
        }

        location /openapi.json {
            proxy_pass http://api/openapi.json;
        }

        # Static files
        location /static/ {
            alias /app/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }
    }

    # SearXNG server (internal use only)
    server {
        listen 8081;
        server_name searxng.internal;
        
        location / {
            proxy_pass http://searxng;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Restrict to internal network
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }

    # Flower monitoring (restricted)
    server {
        listen 5556;
        server_name flower.UnSearch.io;
        
        location / {
            proxy_pass http://flower;
            proxy_set_header Host $host;
            
            # Basic auth for Flower
            auth_basic "Flower Monitoring";
            auth_basic_user_file /etc/nginx/.htpasswd;
            
            # Restrict access
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }
    }

    # HTTPS configuration (uncomment for production)
    # server {
    #     listen 443 ssl http2;
    #     server_name api.UnSearch.io;
    #     
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     
    #     # Include other location blocks from above
    # }
}
