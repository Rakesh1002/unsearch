# Cloudflare Worker config for the UnSearch dashboard.
# Built via @opennextjs/cloudflare, deployed with `pnpm cf:deploy`.

name = "unsearch-web"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
run_worker_first = false

[vars]
NEXT_PUBLIC_API_URL = "https://api.unsearch.dev"

[[routes]]
pattern = "unsearch.dev"
custom_domain = true

[[routes]]
pattern = "www.unsearch.dev"
custom_domain = true

[observability]
enabled = true
