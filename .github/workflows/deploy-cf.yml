name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  worker:
    name: Worker (api.unsearch.dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: workers/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
        working-directory: workers
      - run: pnpm typecheck
        working-directory: workers
      - run: pnpm test
        working-directory: workers
      - name: Apply D1 schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers
          command: d1 execute unsearch-prod --remote --file=./schema.sql
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers
          command: deploy --env production

  container:
    name: Container (FastAPI on CF Containers)
    runs-on: ubuntu-latest
    needs: worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: workers/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
        working-directory: workers
      - name: Deploy Container
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers
          command: containers deploy --config containers.toml

  web:
    name: Web Worker (unsearch.dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
        working-directory: apps/web
      - run: pnpm typecheck
        working-directory: apps/web
      - run: pnpm cf:build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: https://api.unsearch.dev
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

  smoke:
    name: Production smoke tests
    runs-on: ubuntu-latest
    needs: [worker, container, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install httpx pytest
      - run: pytest tests/e2e/test_prod_smoke.py -v
        env:
          UNSEARCH_BASE_URL: https://api.unsearch.dev
          UNSEARCH_TEST_API_KEY: ${{ secrets.UNSEARCH_TEST_API_KEY }}
