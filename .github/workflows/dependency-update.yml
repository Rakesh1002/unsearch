name: Dependency Update

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Update requirements
        run: |
          # Update requirements.txt from requirements.in
          pip-compile requirements.in --upgrade

      - name: Test updated dependencies
        run: |
          pip install -r requirements.txt
          pytest tests/unit/ -v --maxfail=5

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'Automated Dependency Updates'
          body: |
            ## Automated Dependency Updates
            
            This PR contains automated dependency updates generated by pip-compile.
            
            ### Changes
            - Updated Python dependencies to their latest compatible versions
            
            ### Testing
            - ✅ Unit tests passed with updated dependencies
            
            Please review the changes and merge if all checks pass.
          branch: deps/automated-update
          delete-branch: true
          labels: |
            dependencies
            automated

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install safety pip-audit

      - name: Run Safety check
        run: |
          safety check -r requirements.txt --json > safety-report.json || true

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt --format json > pip-audit-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            safety-report.json
            pip-audit-report.json

      - name: Comment on issues
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const safetyReport = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
            const pipAuditReport = JSON.parse(fs.readFileSync('pip-audit-report.json', 'utf8'));
            
            let comment = '## 🔒 Security Audit Results\n\n';
            
            if (safetyReport.vulnerabilities && safetyReport.vulnerabilities.length > 0) {
              comment += '### Safety Vulnerabilities Found:\n';
              safetyReport.vulnerabilities.forEach(vuln => {
                comment += `- **${vuln.package}**: ${vuln.vulnerability}\n`;
              });
            }
            
            if (pipAuditReport.vulnerabilities && pipAuditReport.vulnerabilities.length > 0) {
              comment += '\n### Pip-Audit Vulnerabilities Found:\n';
              pipAuditReport.vulnerabilities.forEach(vuln => {
                comment += `- **${vuln.name}**: ${vuln.description}\n`;
              });
            }
            
            // Create an issue if vulnerabilities found
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security vulnerabilities detected in dependencies',
              body: comment,
              labels: ['security', 'dependencies']
            });
